services:
  server:
    # Option A: Build locally (default)
    build:
      target: runtime
    # Option B: Use pre-built image from GHCR (comment out "build" above and uncomment below)
    # image: ghcr.io/babarot/oksskolten:latest
    command: []
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes: !override
      - ${DATA_DIR:-./data}:/data
    ports: !override
      - "3000:3000"
    expose:
      - "3000"

  meilisearch:
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    ports: !override []

  rss-bridge:
    ports: !override []

  flaresolverr:
    ports: !override []

  frontend:
    deploy:
      replicas: 0

  cloudflared:
    image: cloudflare/cloudflared
    # Force HTTP/2 transport; QUIC has shown intermittent 502s on browser asset/page requests on this host.
    command: tunnel --protocol http2 run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    networks:
      - internal
    restart: unless-stopped
