name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - 'eslint.config.js'
            docs:
              - 'docs/spec/**'
              - 'docs/guides/**'
              - 'docs/adr/**'
              - 'policy/**'
              - 'scripts/lint-docs.sh'
            client:
              - 'src/**'
              - 'shared/**'
              - 'vite.config.ts'
              - 'tailwind.config.ts'
              - 'postcss.config.js'
              - 'index.html'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - 'eslint.config.js'

  check:
    name: Typecheck & Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true' || needs.detect-changes.outputs.client == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  server-test:
    name: Server Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run server tests
        run: npx vitest run --project server --coverage.enabled --coverage.reporter=json-summary --coverage.reportsDirectory=coverage/server

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: server-coverage
          path: coverage/server/coverage-summary.json
          retention-days: 30

      - name: Download base coverage
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v16
        with:
          name: server-coverage
          path: coverage/server-base
          branch: main
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: Check base coverage exists
        if: github.event_name == 'pull_request'
        id: check-base
        run: |
          if [ -f coverage/server-base/coverage-summary.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Coverage Report
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Server Coverage
          json-summary-path: coverage/server/coverage-summary.json
          json-summary-compare-path: ${{ steps.check-base.outputs.exists == 'true' && 'coverage/server-base/coverage-summary.json' || '' }}

  client-test:
    name: Client Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.client == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run client tests
        run: npx vitest run --project client --coverage.enabled --coverage.reporter=json-summary --coverage.reportsDirectory=coverage/client
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: client-coverage
          path: coverage/client/coverage-summary.json
          retention-days: 30

      - name: Download base coverage
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v16
        with:
          name: client-coverage
          path: coverage/client-base
          branch: main
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: Check base coverage exists
        if: github.event_name == 'pull_request'
        id: check-base
        run: |
          if [ -f coverage/client-base/coverage-summary.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Coverage Report
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: Client Coverage
          json-summary-path: coverage/client/coverage-summary.json
          json-summary-compare-path: ${{ steps.check-base.outputs.exists == 'true' && 'coverage/client-base/coverage-summary.json' || '' }}

  lint-docs:
    name: Docs Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.docs == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install conftest
        run: |
          curl -fsSL https://github.com/open-policy-agent/conftest/releases/download/v0.65.0/conftest_0.65.0_Linux_x86_64.tar.gz \
            | tar xz -C /usr/local/bin conftest

      - run: npm ci

      - name: Verify Rego tests
        run: |
          conftest verify --policy policy/spec
          conftest verify --policy policy/guides
          conftest verify --policy policy/adr

      - name: Lint docs
        run: bash scripts/lint-docs.sh

  no-japanese:
    name: No Japanese in source
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true' || needs.detect-changes.outputs.client == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check for Japanese characters
        run: npx tsx scripts/lint-no-japanese.ts

  ci-gate:
    name: CI Gate
    if: always()
    needs: [check, server-test, client-test, lint-docs, no-japanese]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=("${{ needs.check.result }}" "${{ needs.server-test.result }}" "${{ needs.client-test.result }}" "${{ needs.lint-docs.result }}" "${{ needs.no-japanese.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "Job failed with result: $r"
              exit 1
            fi
          done
